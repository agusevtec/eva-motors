site_name: EVA Motors
site_description: A modular library for motor and actuator control on Arduino. Features unified Go() interface, pluggable drivers (Servo, TB6612, TA6586, PWM), decorators for curve shaping, inertia simulation, kick-start, and flexible range mapping for unipolar/bipolar control.
repo_url: https://github.com/agusevtec/eva-motors
theme: material
docs_dir: 'docs-md'
site_dir: 'docs'
nav:
  - Readme:
      - Readme: quickstart/README.md
      - Quickstart: quickstart/quickstart.md
      - Motors: quickstart/motors.md
      - Decors: quickstart/decorators.md
  - API Reference:
      - Classes: eva-motors/annotated.md
      - Hierarchy: eva-motors/hierarchy.md
      - Files: eva-motors/files.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true

plugins:
  - search
  - mkdoxy:
      projects:
        eva-motors:
          src-dirs: ./src
          full-doc: True
          doxy-cfg:
            FILE_PATTERNS: "*.h"
            RECURSIVE: True
            EXTRACT_ALL: NO 
            EXTRACT_STRUCT: NO
            EXTRACT_PRIVATE: NO
            EXTRACT_STATIC: YES

